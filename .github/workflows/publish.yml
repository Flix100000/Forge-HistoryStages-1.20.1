name: Publish Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to CurseForge & Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # CurseForge
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # Modrinth
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # Mod-Details
          name: History Stages ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}
          game-versions: |
            1.19
            1.19.1
            1.19.2
          loaders: forge
          version-type: release
          dependencies: |
            lootr(required)
            jei(optional)
            emi(optional)
          curseforge-environment: both
          modrinth-environment: both
          java: 17
          files: build/libs/!(*-sources).jar

      - name: Upload jar to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/!(*-sources).jar
