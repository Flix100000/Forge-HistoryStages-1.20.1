name: Question
description: Ask a question about usage or configuration
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What do you need help with?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: HistoryStages Version
      placeholder: "e.g. 2.0.1"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant config files, screenshots, or details.
    validations:
      required: false
