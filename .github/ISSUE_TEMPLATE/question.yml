name: Question / Support
description: Ask a question about configuring or using History Stages.
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For quick questions, you can also check the README or ask on Reddit (r/feedthebeast).
        Please do not use this template for bug reports or feature requests.

  - type: input
    id: mod_version
    attributes:
      label: History Stages Version
      placeholder: "3.0.0-1.20.1"
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Stage JSON Configuration
        - In-Game Editors (Stage / Config)
        - Research Pedestal / Scrolls
        - Recipe Locking
        - Commands (/history)
        - JEI / EMI Integration
        - KubeJS / CraftTweaker
        - Loot / Drop Locking
        - Dimension / Entity Locking
        - Toast Notifications / UI
        - Compatibility with another mod
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to do and what you are unsure about.
      placeholder: "How do I lock all items from a specific mod until a certain stage is unlocked?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Relevant Configuration (if applicable)
      description: Paste any stage JSON or config snippets relevant to your question.
      render: json
    validations:
      required: false
