name: Compatibility Issue
description: Report an incompatibility between History Stages and another mod
title: "[Incompatibility] History Stages + "
labels: ["compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before you submit
        > Use this template when History Stages causes problems **in combination with another mod**.
        Common symptoms include:
        - Recipes disappearing from mod machines
        - Items or blocks behaving unexpectedly
        - Crashes that only occur with both mods installed

        If the issue also occurs **without** the other mod, please use the [Bug Report](https://github.com/Flix100000/History-Stages/issues/new?template=bug_report.yml) template instead.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      description: Please confirm all of the following before submitting.
      options:
        - label: I have searched existing issues and this has not been reported before.
          required: true
        - label: I am using the latest available version of History Stages.
          required: true
        - label: I have tested with **only** History Stages and the conflicting mod installed.
          required: true
        - label: The issue does **not** occur when History Stages is removed.
          required: true

  - type: input
    id: hs-version
    attributes:
      label: History Stages Version
      placeholder: "e.g. 3.0.0"
    validations:
      required: true

  - type: input
    id: other-mod
    attributes:
      label: Conflicting Mod (Name + Version)
      placeholder: "e.g. Create 6.0.9"
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft / Forge Version
      placeholder: "e.g. 1.20.1 / Forge 47.4.10"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where does the conflict occur?
      options:
        - Singleplayer (integrated server)
        - Dedicated Server + Client
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the Conflict
      description: What goes wrong? When does it happen? What did you expect instead?
      placeholder: |
        **What happened:**
        Recipes from Create disappear in-game after History Stages is installed, even though they are still visible in JEI.

        **What I expected:**
        Recipes should only be hidden for players who have not yet unlocked the relevant stage.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal, reliable set of steps to reproduce the conflict.
      placeholder: |
        1. Install History Stages and the conflicting mod.
        2. Configure stage X to lock item Y (see JSON below).
        3. Join the world and open the mod's interface.
        4. Observe that ...
    validations:
      required: true

  - type: textarea
    id: stage-config
    attributes:
      label: Relevant Stage JSON
      description: Paste the stage config that triggers the conflict. Leave blank if not applicable.
      render: json
    validations:
      required: false

  - type: textarea
    id: log
    attributes:
      label: Log / Crash Report
      description: |
        Paste the relevant error from `latest.log` or the crash report.
        For long logs, please use a paste service such as [mclo.gs](https://mclo.gs) and share the link.
      render: text
    validations:
      required: false
