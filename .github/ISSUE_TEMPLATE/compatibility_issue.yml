name: Compatibility Issue
description: Report an incompatibility with another mod
title: "[Incompatibility] History Stages + "
labels: ["compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when History Stages causes issues in combination with another mod.
        Common symptoms: recipes disappearing from mod machines, items behaving unexpectedly,
        or crashes that only occur with both mods installed.

  - type: input
    id: version
    attributes:
      label: History Stages Version
      placeholder: "e.g. 3.0.0"
    validations:
      required: true

  - type: input
    id: other-mod
    attributes:
      label: Conflicting Mod (Name + Version)
      placeholder: "e.g. Create 6.0.9"
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft / Forge Version
      placeholder: "e.g. 1.20.1 / Forge 47.4.10"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Singleplayer (integrated server)
        - Dedicated Server + Client
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the Conflict
      description: What goes wrong? When does it happen?
      placeholder: "Recipes from the other mod disappear in-game after History Stages is installed, even though they are still visible in JEI."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Install History Stages and the conflicting mod.
        2. Configure stage X to lock item Y.
        3. Open the mod's interface.
        4. Observe that ...
    validations:
      required: true

  - type: textarea
    id: stage-config
    attributes:
      label: Relevant Stage JSON (if applicable)
      description: Paste the stage config that triggers the conflict.
      render: json
    validations:
      required: false

  - type: textarea
    id: log
    attributes:
      label: Log / Crash Report
      description: "Paste the relevant error from your latest.log or crash report. Use a paste site (e.g. https://mclo.gs) for full logs."
      render: text
    validations:
      required: false

  - type: checkboxes
    id: isolation
    attributes:
      label: Isolation Check
      description: Please confirm before submitting.
      options:
        - label: I have reproduced this with only History Stages and the conflicting mod installed.
        - label: The issue does not occur when History Stages is removed.
    validations:
      required: false
