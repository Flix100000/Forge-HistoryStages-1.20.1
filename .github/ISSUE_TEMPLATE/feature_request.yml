name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: Why would this be useful? How would you use it?
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: Example
      description: If applicable, provide an example of how this feature would work (e.g. JSON config, command usage).
      render: json
    validations:
      required: false
