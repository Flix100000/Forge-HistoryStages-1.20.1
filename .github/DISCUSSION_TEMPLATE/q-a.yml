title: "[Question] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## Before you ask
        > Please take a moment to check the following before posting your question:
        - Browse the [existing discussions](https://github.com/Flix100000/History-Stages/discussions) – your question may already be answered.
        - Check the mod's documentation and README for configuration examples.
        - If you found a **bug or crash**, please use the [Issues](https://github.com/Flix100000/History-Stages/issues/new/choose) section instead.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing discussions and my question has not been asked before.
          required: true
        - label: This is a question, not a bug report or feature request.
          required: true

  - type: input
    id: mod_version
    attributes:
      label: History Stages Version
      placeholder: "e.g. 3.0.0-1.20.1"
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      description: Which area of the mod does your question relate to?
      options:
        - Stage JSON Configuration
        - In-Game Editors (Stage / Config)
        - Research Pedestal / Scrolls
        - Recipe Locking
        - Commands (/history)
        - JEI / EMI Integration
        - FTBQuests Integration
        - KubeJS / CraftTweaker
        - Loot / Drop Locking
        - Dimension / Entity Locking
        - Toast Notifications / UI
        - Compatibility with another mod
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Describe what you are trying to do and what you are unsure about. The more detail you provide, the faster we can help.
      placeholder: "How do I lock all items from a specific mod until a certain stage is unlocked?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Relevant Configuration
      description: Paste any stage JSON or config snippets relevant to your question. Leave blank if not applicable.
      render: json
    validations:
      required: false
