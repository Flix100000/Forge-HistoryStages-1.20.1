title: "[Question] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for asking! Please provide as much detail as possible so we can help you quickly.
        For bug reports, please use the [Issues](https://github.com/Flix100000/History-Stages/issues/new/choose) section instead.

  - type: input
    id: mod_version
    attributes:
      label: History Stages Version
      placeholder: "3.0.0-1.20.1"
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Stage JSON Configuration
        - In-Game Editors (Stage / Config)
        - Research Pedestal / Scrolls
        - Recipe Locking
        - Commands (/history)
        - JEI / EMI Integration
        - KubeJS / CraftTweaker
        - Loot / Drop Locking
        - Dimension / Entity Locking
        - Toast Notifications / UI
        - Compatibility with another mod
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to do and what you are unsure about.
      placeholder: "How do I lock all items from a specific mod until a certain stage is unlocked?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Relevant Configuration (if applicable)
      description: Paste any stage JSON or config snippets relevant to your question.
      render: json
    validations:
      required: false
