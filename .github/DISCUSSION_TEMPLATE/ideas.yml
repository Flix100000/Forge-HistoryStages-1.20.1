title: "[Idea] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! Before submitting, please check if a similar suggestion already exists.
        Note: Per-player stage unlocking is a known limitation and will not be implemented,
        as global locking via the RecipeManager Mixin cannot operate on a per-player basis.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What should the mod do that it currently does not?
      placeholder: "It would be useful if the Research Pedestal could output a redstone signal when a stage is unlocked."
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: How would you use this feature in a modpack?
      placeholder: "This would allow automating stage-dependent logic using redstone or modded automation."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you found a workaround, or is there currently no way to achieve this?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What area of the mod does this affect?
      options:
        - Research Pedestal / Scrolls
        - Stage Configuration (JSON)
        - In-Game Editors (Stage / Config)
        - Recipe Locking
        - Commands
        - JEI / EMI Integration
        - Loot / Mob Drop Locking
        - Dimension Locking
        - Entity Locking
        - Toast Notifications / UI
        - Lock Icon Overlay
        - Debug Logging
        - KubeJS / CraftTweaker API
        - Configuration (config files)
        - Other
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example
      description: If applicable, provide an example of how this feature would work (e.g. JSON config, command usage).
      render: json
    validations:
      required: false
